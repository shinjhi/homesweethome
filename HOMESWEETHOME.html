<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HOMESWEETHOME</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #F6F3EC;
    --surface: #FFFFFF;
    --ink: #1C2430;
    --ink-soft: #5B6472;
    --border: #E4DFD3;
    --gold: #B8892F;
    --gold-soft: #EFDFB8;
    --teal: #3D6B63;
    --teal-soft: #DCE9E5;
    --coral: #BE5039;
    --coral-soft: #F3DCD5;
    --radius: 14px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter', -apple-system, sans-serif;
    padding: 28px 18px 60px;
    -webkit-font-smoothing: antialiased;
  }
  .wrap{max-width: 920px; margin: 0 auto;}
  .num{font-family:'IBM Plex Mono', monospace; font-variant-numeric: tabular-nums;}

  header.top{margin-bottom: 24px;}
  .eyebrow{
    font-family:'IBM Plex Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.08em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  h1{
    font-family:'Fraunces', serif;
    font-weight: 600;
    font-size: 30px;
    margin: 0 0 4px;
    letter-spacing: -0.01em;
  }
  .sub{color: var(--ink-soft); font-size: 14.5px; margin:0;}

  .card{
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px;
  }

  /* Goal panel */
  .goal-panel{
    display:grid;
    grid-template-columns: 190px 1fr;
    gap: 26px;
    margin-bottom: 18px;
    align-items:center;
  }
  @media (max-width: 620px){
    .goal-panel{grid-template-columns: 1fr; }
    .building-wrap{justify-self:center;}
  }
  .building-wrap svg{display:block;}
  .goal-info h2{
    font-family:'Fraunces', serif;
    font-size: 20px;
    margin: 0 0 14px;
    font-weight:600;
  }
  .goal-stats{
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }
  @media (max-width: 520px){ .goal-stats{grid-template-columns: 1fr 1fr;} }
  .stat{
    background: var(--bg);
    border-radius: 10px;
    padding: 12px 14px;
  }
  .stat .label{font-size:11.5px; color:var(--ink-soft); margin-bottom:4px;}
  .stat .value{font-size: 18px; font-weight:600;}
  .stat .value.gold{color:var(--gold);}
  .stat .value.teal{color:var(--teal);}

  .goal-edit{
    margin-top:16px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    font-size:13px;
    color: var(--ink-soft);
  }
  .goal-edit label{display:flex; align-items:center; gap:6px;}
  .goal-edit input{
    width: 90px;
    padding: 5px 8px;
    border-radius: 6px;
    border: 1px solid var(--border);
    font-family:'IBM Plex Mono', monospace;
    font-size: 13px;
  }

  section{margin-top: 22px;}
  .section-title{
    font-family:'Fraunces', serif;
    font-size: 17px;
    font-weight:600;
    margin: 0 0 12px;
    display:flex;
    align-items:baseline;
    gap:8px;
  }
  .section-title .n{color:var(--gold); font-family:'IBM Plex Mono',monospace; font-size:13px;}

  /* Category settings */
  .cat-groups{display:flex; flex-direction:column; gap:18px;}
  .cat-group .cat-group-label{
    font-size: 12.5px;
    font-weight:600;
    color: var(--ink-soft);
    margin-bottom: 8px;
    display:flex;
    align-items:center;
    gap:6px;
  }
  .cat-group .cat-group-label .dot{width:8px; height:8px; border-radius:50%; display:inline-block;}
  .dot.expense{background:var(--coral);}
  .dot.savings{background:var(--teal);}
  .dot.invest{background:var(--gold);}
  .chip-row{display:flex; flex-wrap:wrap; gap:8px; margin-bottom:10px;}
  .chip{
    display:flex; align-items:center; gap:6px;
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 5px 6px 5px 12px;
    border-radius: 20px;
    font-size: 13px;
  }
  .chip button{
    background:none; border:none; padding:2px 4px;
    color:#9AA2AD; font-size:14px; line-height:1; cursor:pointer; border-radius:50%;
  }
  .chip button:hover{color:var(--coral);}
  .add-cat-row{display:flex; gap:8px;}
  .add-cat-row input{
    flex:1;
    padding: 8px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    font-size: 13.5px;
    background: var(--bg);
  }
  .add-cat-row button{
    background: var(--ink); color:#fff; font-size:13px; padding: 8px 16px;
  }
  .chip-budget{
    width: 56px;
    border: none;
    background: transparent;
    font-family:'IBM Plex Mono', monospace;
    font-size: 12px;
    text-align: right;
    padding: 2px 4px;
    color: var(--ink-soft);
  }
  .chip-budget:focus{outline: 1px solid var(--gold); border-radius:4px; color:var(--ink);}

  /* Form */
  form.entry-form{
    display:flex;
    flex-direction:column;
    gap: 20px;
  }
  .income-row{
    display:grid;
    grid-template-columns: 220px 1fr;
    gap: 14px;
    align-items:end;
  }
  @media (max-width: 500px){ .income-row{grid-template-columns: 1fr;} }
  .field-group-title{
    font-size: 12px;
    font-weight:600;
    color: var(--ink-soft);
    margin-bottom: 8px;
    display:flex; align-items:center; gap:6px;
  }
  .field-group-title .dot{width:8px; height:8px; border-radius:50%; display:inline-block;}
  .field-grid{
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 12px;
  }
  .field{display:flex; flex-direction:column; gap:5px;}
  .field label{font-size:12.5px; color:var(--ink-soft);}
  .field .hint{font-size: 11px; color:#9AA2AD; margin-top:2px;}
  .field input{
    padding: 9px 11px;
    border-radius: 8px;
    border: 1px solid var(--border);
    font-family:'IBM Plex Mono', monospace;
    font-size: 14px;
    background: var(--bg);
  }
  .field input:focus{outline: 2px solid var(--gold-soft); border-color: var(--gold);}
  .field input.over-budget{border-color: var(--coral); background: var(--coral-soft);}
  .field input.goal-met{border-color: var(--teal); background: var(--teal-soft);}
  .form-actions{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top: 4px;
    flex-wrap:wrap;
    gap:10px;
    border-top: 1px solid var(--border);
    padding-top: 16px;
  }
  .savings-preview{font-size:13px; color:var(--ink-soft);}
  .savings-preview b{color:var(--teal); font-family:'IBM Plex Mono',monospace;}
  button{
    font-family:'Inter', sans-serif;
    font-weight:600;
    font-size: 13.5px;
    border: none;
    border-radius: 8px;
    padding: 10px 18px;
    cursor:pointer;
    transition: transform 0.1s ease, opacity 0.15s ease;
  }
  button:active{transform: scale(0.97);}
  button.primary{background: var(--ink); color: #fff;}
  button.ghost{background:transparent; color: var(--ink-soft); border:1px solid var(--border);}
  button.danger-ghost{background:transparent; color: var(--coral); border:1px solid var(--coral-soft); font-size:12px; padding:5px 10px;}

  /* History table */
  table{width:100%; border-collapse: collapse; font-size: 13.5px;}
  th{
    text-align:right;
    font-weight:500;
    color: var(--ink-soft);
    font-size: 11.5px;
    text-transform:uppercase;
    letter-spacing:0.03em;
    padding: 8px 8px;
    border-bottom: 1px solid var(--border);
  }
  th:first-child, td:first-child{text-align:left;}
  td{
    text-align:right;
    padding: 10px 8px;
    border-bottom: 1px solid var(--border);
    font-family:'IBM Plex Mono', monospace;
  }
  td.month{font-family:'Inter', sans-serif; font-weight:500;}
  tr:last-child td{border-bottom:none;}
  .rate-pill{
    display:inline-block;
    padding: 2px 8px;
    border-radius: 20px;
    font-size:11.5px;
    font-family:'Inter', sans-serif;
    font-weight:600;
  }
  .rate-pill.good{background: var(--teal-soft); color: var(--teal);}
  .rate-pill.low{background: var(--coral-soft); color: var(--coral);}
  .empty-row td{
    text-align:center;
    color: var(--ink-soft);
    padding: 26px 0;
    font-family:'Inter', sans-serif;
  }
  .detail-row td{
    text-align:left;
    font-family:'Inter', sans-serif;
    color: var(--ink-soft);
    font-size: 12.5px;
    background: var(--bg);
    padding: 10px 12px;
  }
  .detail-row .detail-cats{display:flex; flex-wrap:wrap; gap: 6px 16px;}
  .detail-row .detail-cats span b{color:var(--ink); font-family:'IBM Plex Mono', monospace;}
  .expand-btn{
    background:none; border:none; color:var(--ink-soft); cursor:pointer; font-size:15px; padding:2px 6px;
  }

  /* chart */
  .chart-card{padding-bottom: 10px;}
  .chart-bars{
    display:flex;
    align-items:flex-end;
    gap: 10px;
    height: 140px;
    margin-top: 8px;
    padding: 0 4px;
  }
  .bar-col{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-end;
    height:100%;
    gap:6px;
  }
  .bar{
    width: 100%;
    max-width: 34px;
    background: linear-gradient(180deg, var(--gold) 0%, #D9B66A 100%);
    border-radius: 5px 5px 3px 3px;
    min-height: 3px;
  }
  .bar-label{font-size:10.5px; color: var(--ink-soft); font-family:'IBM Plex Mono',monospace;}

  /* pie / donut chart */
  .pie-tabs{display:flex; gap:8px; margin-bottom:16px;}
  .pie-tab{
    background: var(--bg); border:1px solid var(--border); color:var(--ink-soft);
    font-size:12.5px; font-weight:600; padding:6px 14px; border-radius:20px; cursor:pointer;
  }
  .pie-tab.active{background:var(--ink); color:#fff; border-color:var(--ink);}
  .pie-wrap{display:flex; gap:28px; align-items:center; flex-wrap:wrap;}
  .donut{
    position:relative;
    width:150px; height:150px; border-radius:50%;
    flex-shrink:0;
    background: var(--bg);
  }
  .donut::after{
    content:'';
    position:absolute;
    top:50%; left:50%;
    width:58%; height:58%;
    background: var(--surface);
    border-radius:50%;
    transform:translate(-50%,-50%);
  }
  .pie-legend{flex:1; min-width:180px; display:flex; flex-direction:column; gap:9px;}
  .pie-legend-item{display:flex; align-items:center; justify-content:space-between; gap:10px; font-size:13px;}
  .pie-legend-item .name{display:flex; align-items:center; gap:8px; color:var(--ink-soft);}
  .pie-legend-item .swatch{width:10px; height:10px; border-radius:3px; display:inline-block; flex-shrink:0;}
  .pie-legend-item .amt{font-family:'IBM Plex Mono', monospace; font-weight:600; white-space:nowrap;}
  .pie-month-select{
    margin-left:auto;
    font-family:'IBM Plex Mono', monospace;
    font-size: 12px;
    border:1px solid var(--border);
    border-radius:6px;
    padding:5px 8px;
    background: var(--bg);
    color: var(--ink);
  }

  .data-actions{
    margin-top: 30px;
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
  }
  .data-actions button, .data-actions label{font-size:12px; color:#8A8271;}

  .reset-row{
    margin-top: 12px;
    text-align:center;
  }
  .reset-row button{font-size:12px; color:#B8B0A0;}

  .toast{
    position:fixed;
    bottom: 22px;
    left:50%;
    transform: translateX(-50%);
    background: var(--ink);
    color:#fff;
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 13px;
    opacity:0;
    pointer-events:none;
    transition: opacity 0.25s ease;
  }
  .toast.show{opacity:1;}
</style>
</head>
<body>
<div class="wrap">

  <header class="top">
    <div class="eyebrow">Home Purchase Fund</div>
    <h1>HOMESWEETHOME</h1>
    <p class="sub" id="subtitle">자산을 쌓아 목표에 도착하는 과정을 기록해요.</p>
  </header>

  <div class="card goal-panel">
    <div class="building-wrap" id="buildingWrap"></div>
    <div class="goal-info">
      <h2 id="goalHeadline">목표까지 -</h2>
      <div class="goal-stats">
        <div class="stat">
          <div class="label">현재 자산</div>
          <div class="value" id="statCurrent">-</div>
        </div>
        <div class="stat">
          <div class="label">목표 자산</div>
          <div class="value gold" id="statTarget">-</div>
        </div>
        <div class="stat">
          <div class="label">남은 금액</div>
          <div class="value" id="statRemaining">-</div>
        </div>
        <div class="stat">
          <div class="label">평균 월 적립</div>
          <div class="value teal" id="statAvg">-</div>
        </div>
        <div class="stat">
          <div class="label">예상 도달</div>
          <div class="value" id="statEta">-</div>
        </div>
        <div class="stat">
          <div class="label">진행률</div>
          <div class="value gold" id="statPct">-</div>
        </div>
      </div>
      <div class="goal-edit">
        <label>현재 자산(만원) <input type="number" id="baseAssetInput" step="100"></label>
        <label>목표 자산(만원) <input type="number" id="targetAssetInput" step="100"></label>
        <button class="ghost" id="saveGoalBtn" style="padding:6px 12px; font-size:12px;">저장</button>
      </div>
    </div>
  </div>

  <section>
    <div class="section-title"><span class="n">00</span> 카테고리 설정</div>
    <div class="card cat-groups">
      <div class="cat-group">
        <div class="cat-group-label"><span class="dot expense"></span>소비 카테고리</div>
        <div class="chip-row" id="chipsExpense"></div>
        <div class="add-cat-row">
          <input type="text" id="newCatExpense" placeholder="예: 육아, 경조사비">
          <button onclick="addCategory('expense')">추가</button>
        </div>
      </div>
      <div class="cat-group">
        <div class="cat-group-label"><span class="dot savings"></span>저축 카테고리</div>
        <div class="chip-row" id="chipsSavings"></div>
        <div class="add-cat-row">
          <input type="text" id="newCatSavings" placeholder="예: 비상금 통장">
          <button onclick="addCategory('savings')">추가</button>
        </div>
      </div>
      <div class="cat-group">
        <div class="cat-group-label"><span class="dot invest"></span>투자 종목</div>
        <div class="chip-row" id="chipsInvest"></div>
        <div class="add-cat-row">
          <input type="text" id="newCatInvest" placeholder="예: 삼성전자, 나스닥ETF">
          <button onclick="addCategory('invest')">추가</button>
        </div>
      </div>
    </div>
  </section>

  <section>
    <div class="section-title"><span class="n">01</span> 이번 달 입력</div>
    <div class="card">
      <form class="entry-form" id="entryForm">
        <div class="income-row">
          <div class="field">
            <label>대상 월</label>
            <input type="month" id="fMonth" required>
          </div>
          <div class="field">
            <label>수입 (만원)</label>
            <input type="number" id="fIncome" placeholder="0" min="0" required>
          </div>
        </div>

        <div>
          <div class="field-group-title"><span class="dot expense"></span>소비</div>
          <div class="field-grid" id="gridExpense"></div>
        </div>
        <div>
          <div class="field-group-title"><span class="dot savings"></span>저축</div>
          <div class="field-grid" id="gridSavings"></div>
        </div>
        <div>
          <div class="field-group-title"><span class="dot invest"></span>투자</div>
          <div class="field-grid" id="gridInvest"></div>
        </div>

        <div class="form-actions">
          <div class="savings-preview" id="savingsPreview">저축률 계산 중…</div>
          <button type="submit" class="primary">이번 달 기록 저장</button>
        </div>
      </form>
    </div>
  </section>

  <section class="chart-card">
    <div class="section-title"><span class="n">02</span> 월별 적립 추이</div>
    <div class="card">
      <div class="chart-bars" id="chartBars"></div>
    </div>
  </section>

  <section>
    <div class="section-title">
      <span class="n">03</span> 카테고리 비중
      <select class="pie-month-select" id="pieMonthSelect"></select>
    </div>
    <div class="card">
      <div class="pie-tabs" id="pieTabs"></div>
      <div class="pie-wrap">
        <div class="donut" id="donutChart"></div>
        <div class="pie-legend" id="pieLegend"></div>
      </div>
    </div>
  </section>

  <section>
    <div class="section-title"><span class="n">04</span> 히스토리</div>
    <div class="card" style="padding: 8px 16px 16px;">
      <table>
        <thead>
          <tr>
            <th>월</th>
            <th>수입</th>
            <th>소비</th>
            <th>저축+투자</th>
            <th>저축률</th>
            <th></th>
            <th></th>
            <th></th>
          </tr>
        </thead>
        <tbody id="historyBody">
        </tbody>
      </table>
    </div>
  </section>

  <div class="data-actions">
    <button class="ghost" id="exportBtn">데이터 내보내기</button>
    <label class="ghost" style="cursor:pointer; display:inline-flex; align-items:center; padding:10px 18px; border:1px solid var(--border); border-radius:8px;">
      데이터 가져오기
      <input type="file" id="importFile" accept="application/json" style="display:none;">
    </label>
  </div>
  <div class="reset-row">
    <button class="ghost" id="resetBtn">전체 데이터 초기화</button>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'home-budget-data-v2';

const DEFAULT_DATA = {
  baseAsset: 54000,   // 5.4억 in 만원
  targetAsset: 85000, // 8.5억 in 만원
  categories: {
    expense: [],
    savings: [],
    invest: []
  },
  budgets: { // {group: {cat: monthlyBudgetInManwon}}
    expense: {},
    savings: {},
    invest: {}
  },
  entries: [] // {month, income, expense:{cat:amt}, savings:{cat:amt}, invest:{cat:amt}}
};

const PIE_COLORS = ['#B8892F','#3D6B63','#BE5039','#6D8FB0','#8A6BB0','#C9A62B','#5B8C5A','#B0587A'];

let state = JSON.parse(JSON.stringify(DEFAULT_DATA));
let expandedMonths = new Set();
let pieGroup = 'expense';

function formatManwon(v){
  const n = Math.round(v);
  if (Math.abs(n) >= 10000){
    const eok = n / 10000;
    return (Math.round(eok*10)/10).toLocaleString('ko-KR') + '억';
  }
  return n.toLocaleString('ko-KR') + '만원';
}

function monthLabel(m){
  const [y, mo] = m.split('-');
  return `${y.slice(2)}.${mo}`;
}

function sumGroup(obj){
  return Object.values(obj || {}).reduce((s, v) => s + (Number(v) || 0), 0);
}

async function loadData(){
  try{
    const result = await window.storage.get(STORAGE_KEY, false);
    if (result && result.value){
      const parsed = JSON.parse(result.value);
      state = {
        baseAsset: parsed.baseAsset ?? DEFAULT_DATA.baseAsset,
        targetAsset: parsed.targetAsset ?? DEFAULT_DATA.targetAsset,
        categories: {
          expense: parsed.categories?.expense ?? DEFAULT_DATA.categories.expense,
          savings: parsed.categories?.savings ?? DEFAULT_DATA.categories.savings,
          invest: parsed.categories?.invest ?? DEFAULT_DATA.categories.invest,
        },
        budgets: {
          expense: parsed.budgets?.expense ?? {},
          savings: parsed.budgets?.savings ?? {},
          invest: parsed.budgets?.invest ?? {},
        },
        entries: parsed.entries ?? []
      };
    }
  }catch(e){
    // no existing data yet, use defaults
  }
  render();
}

async function saveData(){
  try{
    await window.storage.set(STORAGE_KEY, JSON.stringify(state), false);
  }catch(e){
    showToast('저장에 실패했어요. 다시 시도해주세요.');
  }
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=> t.classList.remove('show'), 1800);
}

function totalSaved(){
  return state.entries.reduce((sum, e) =>
    sum + sumGroup(e.savings) + sumGroup(e.invest), 0);
}

function currentAsset(){
  return state.baseAsset + totalSaved();
}

function avgMonthlyContribution(){
  if (state.entries.length === 0) return 0;
  const recent = [...state.entries].sort((a,b)=>a.month.localeCompare(b.month)).slice(-6);
  const sum = recent.reduce((s,e)=> s + sumGroup(e.savings) + sumGroup(e.invest), 0);
  return sum / recent.length;
}

function buildBuildingSVG(pct){
  const floors = 16;
  const filled = Math.max(0, Math.min(floors, Math.round((pct/100) * floors)));
  const floorH = 9;
  const floorGap = 2;
  const width = 120;
  const height = floors * (floorH + floorGap) + 26;
  let rects = '';
  for (let i=0; i<floors; i++){
    const y = height - 20 - (i+1)*(floorH+floorGap) + floorGap;
    const isFilled = i < filled;
    rects += `<rect x="14" y="${y}" width="${width-28}" height="${floorH}" rx="2"
      fill="${isFilled ? 'var(--gold)' : 'none'}"
      stroke="${isFilled ? 'none' : '#D9D2C2'}" stroke-width="1.4"/>`;
  }
  const roofY = height - 20 - floors*(floorH+floorGap) + floorGap - 14;
  const roofColor = filled >= floors ? 'var(--gold)' : '#D9D2C2';
  return `
  <svg width="${width}" height="${height+10}" viewBox="0 0 ${width} ${height+10}" xmlns="http://www.w3.org/2000/svg">
    <polygon points="${width/2},${roofY} 10,${roofY+16} ${width-10},${roofY+16}" fill="${roofColor}"/>
    ${rects}
    <rect x="0" y="${height-18}" width="${width}" height="4" rx="2" fill="#E4DFD3"/>
  </svg>`;
}

// ---- category management ----
function renderChips(group, containerId){
  const el = document.getElementById(containerId);
  if (state.categories[group].length === 0){
    el.innerHTML = `<span style="font-size:12.5px; color:#9AA2AD;">아직 카테고리가 없어요. 아래에 추가해보세요.</span>`;
    return;
  }
  el.innerHTML = state.categories[group].map(name => {
    const budget = (state.budgets?.[group] || {})[name] || '';
    return `
    <div class="chip">
      <span>${name}</span>
      <input type="number" class="chip-budget" min="0" placeholder="예산" title="월 예산(만원)"
        value="${budget}" data-group="${group}" data-cat="${name.replace(/"/g, '&quot;')}">
      <button onclick="removeCategory('${group}', '${name.replace(/'/g, "\\'")}')" title="삭제">×</button>
    </div>`;
  }).join('');
}

document.addEventListener('change', async (ev) => {
  if (!ev.target.classList.contains('chip-budget')) return;
  const group = ev.target.dataset.group;
  const cat = ev.target.dataset.cat;
  const val = Number(ev.target.value) || 0;
  if (!state.budgets) state.budgets = { expense:{}, savings:{}, invest:{} };
  if (!state.budgets[group]) state.budgets[group] = {};
  if (val > 0) state.budgets[group][cat] = val;
  else delete state.budgets[group][cat];
  await saveData();
  const containerId = { expense:'gridExpense', savings:'gridSavings', invest:'gridInvest' }[group];
  reRenderFormGridPreserving(group, containerId);
});

async function addCategory(group){
  const inputId = { expense: 'newCatExpense', savings: 'newCatSavings', invest: 'newCatInvest' }[group];
  const input = document.getElementById(inputId);
  const name = input.value.trim();
  if (!name) return;
  if (state.categories[group].includes(name)){
    showToast('이미 있는 카테고리예요');
    return;
  }
  state.categories[group].push(name);
  input.value = '';
  await saveData();
  renderAll();
  showToast(`"${name}" 카테고리를 추가했어요`);
}
window.addCategory = addCategory;

async function removeCategory(group, name){
  state.categories[group] = state.categories[group].filter(c => c !== name);
  await saveData();
  renderAll();
  showToast(`"${name}" 카테고리를 삭제했어요`);
}
window.removeCategory = removeCategory;

// ---- dynamic entry form ----
function renderFormGrid(group, containerId){
  const el = document.getElementById(containerId);
  if (state.categories[group].length === 0){
    el.innerHTML = `<div style="font-size:12.5px; color:#9AA2AD;">위 "카테고리 설정"에서 항목을 먼저 추가해주세요.</div>`;
    return;
  }
  el.innerHTML = state.categories[group].map(name => {
    const budget = (state.budgets?.[group] || {})[name];
    return `
    <div class="field">
      <label>${name}</label>
      <input type="number" min="0" placeholder="0" data-group="${group}" data-cat="${name.replace(/"/g, '&quot;')}">
      ${budget ? `<div class="hint">예산 ${formatManwon(budget)}</div>` : ''}
    </div>`;
  }).join('');
}

function applyBudgetStyle(inp){
  const group = inp.dataset.group;
  const cat = inp.dataset.cat;
  inp.classList.remove('over-budget', 'goal-met');
  if (!group || !cat) return;
  const budget = (state.budgets?.[group] || {})[cat];
  if (!budget) return;
  const val = Number(inp.value) || 0;
  if (val <= 0) return;
  if (group === 'expense'){
    if (val > budget) inp.classList.add('over-budget');
  } else {
    if (val >= budget) inp.classList.add('goal-met');
  }
}

function reRenderFormGridPreserving(group, containerId){
  const el = document.getElementById(containerId);
  const prevValues = {};
  el.querySelectorAll('input[data-cat]').forEach(inp => { prevValues[inp.dataset.cat] = inp.value; });
  renderFormGrid(group, containerId);
  el.querySelectorAll('input[data-cat]').forEach(inp => {
    if (prevValues[inp.dataset.cat] !== undefined) inp.value = prevValues[inp.dataset.cat];
    inp.addEventListener('input', () => { updateSavingsPreview(); applyBudgetStyle(inp); });
    applyBudgetStyle(inp);
  });
}

function collectFormGroup(group){
  const inputs = document.querySelectorAll(`#gridExpense input, #gridSavings input, #gridInvest input`);
  const out = {};
  inputs.forEach(inp => {
    if (inp.dataset.group === group){
      out[inp.dataset.cat] = Number(inp.value) || 0;
    }
  });
  return out;
}

function updateSavingsPreview(){
  const income = Number(document.getElementById('fIncome').value) || 0;
  const savings = sumGroup(collectFormGroup('savings'));
  const invest = sumGroup(collectFormGroup('invest'));
  const total = savings + invest;
  const rate = income > 0 ? (total/income*100).toFixed(0) : '-';
  document.getElementById('savingsPreview').innerHTML =
    `이번 달 저축+투자 <b>${formatManwon(total)}</b> · 저축률 <b>${rate}${rate === '-' ? '' : '%'}</b>`;
}

function renderAll(){
  renderChips('expense', 'chipsExpense');
  renderChips('savings', 'chipsSavings');
  renderChips('invest', 'chipsInvest');
  renderFormGrid('expense', 'gridExpense');
  renderFormGrid('savings', 'gridSavings');
  renderFormGrid('invest', 'gridInvest');
  document.querySelectorAll('.entry-form input[type=number]').forEach(inp => {
    inp.addEventListener('input', () => {
      updateSavingsPreview();
      applyBudgetStyle(inp);
    });
    applyBudgetStyle(inp);
  });
  updateSavingsPreview();
}

function render(){
  const current = currentAsset();
  const target = state.targetAsset;
  const remaining = Math.max(0, target - current);
  const pct = target > 0 ? Math.min(100, (current/target)*100) : 0;
  const avg = avgMonthlyContribution();

  document.getElementById('statCurrent').textContent = formatManwon(current);
  document.getElementById('statTarget').textContent = formatManwon(target);
  document.getElementById('statRemaining').textContent = remaining <= 0 ? '달성!' : formatManwon(remaining);
  document.getElementById('statAvg').textContent = avg > 0 ? formatManwon(avg) + '/월' : '기록 필요';
  document.getElementById('statPct').textContent = pct.toFixed(1) + '%';

  let etaText = '-';
  if (remaining <= 0){
    etaText = '목표 달성';
  } else if (avg > 0){
    const monthsLeft = Math.ceil(remaining / avg);
    const d = new Date();
    d.setMonth(d.getMonth() + monthsLeft);
    etaText = `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')} (${monthsLeft}개월)`;
  } else {
    etaText = '기록 필요';
  }
  document.getElementById('statEta').textContent = etaText;

  document.getElementById('goalHeadline').textContent =
    remaining <= 0 ? '목표 자산 달성했어요' : `목표까지 ${formatManwon(remaining)} 남았어요`;

  document.getElementById('buildingWrap').innerHTML = buildBuildingSVG(pct);

  document.getElementById('baseAssetInput').value = state.baseAsset;
  document.getElementById('targetAssetInput').value = state.targetAsset;

  renderAll();
  renderHistory();
  renderChart();
  renderPie();
}

function renderHistory(){
  const body = document.getElementById('historyBody');
  if (state.entries.length === 0){
    body.innerHTML = `<tr class="empty-row"><td colspan="8">아직 기록이 없어요. 이번 달 내역을 입력해보세요.</td></tr>`;
    return;
  }
  const sorted = [...state.entries].sort((a,b)=> a.month.localeCompare(b.month));
  let rows = '';
  sorted.forEach(e => {
    const expenseTotal = sumGroup(e.expense);
    const savingsInvestTotal = sumGroup(e.savings) + sumGroup(e.invest);
    const rate = e.income > 0 ? (savingsInvestTotal / e.income * 100) : 0;
    const pillClass = rate >= 30 ? 'good' : 'low';
    const isExpanded = expandedMonths.has(e.month);
    rows += `<tr>
      <td class="month">${monthLabel(e.month)}</td>
      <td>${formatManwon(e.income)}</td>
      <td>${formatManwon(expenseTotal)}</td>
      <td>${formatManwon(savingsInvestTotal)}</td>
      <td><span class="rate-pill ${pillClass}">${rate.toFixed(0)}%</span></td>
      <td><button class="ghost" style="padding:4px 10px; font-size:11.5px;" onclick="editEntry('${e.month}')">수정</button></td>
      <td><button class="expand-btn" onclick="toggleDetail('${e.month}')">${isExpanded ? '▲' : '▼'}</button></td>
      <td><button class="danger-ghost" onclick="deleteEntry('${e.month}')">삭제</button></td>
    </tr>`;
    if (isExpanded){
      const catLine = (obj, group) => Object.entries(obj || {})
        .filter(([,v]) => Number(v) > 0)
        .map(([k,v]) => {
          const budget = (state.budgets?.[group] || {})[k];
          const over = group === 'expense' && budget && Number(v) > budget;
          return `<span>${k} <b>${formatManwon(v)}</b>${over ? ' <span style="color:var(--coral); font-size:11px;">초과</span>' : ''}</span>`;
        }).join('');
      rows += `<tr class="detail-row"><td colspan="8">
        <div class="detail-cats">${catLine(e.expense, 'expense') || '<span>소비 내역 없음</span>'}</div>
        <div class="detail-cats" style="margin-top:8px;">${catLine(e.savings, 'savings')}${catLine(e.invest, 'invest') || ''}</div>
      </td></tr>`;
    }
  });
  body.innerHTML = rows;
}

function editEntry(month){
  const e = state.entries.find(x => x.month === month);
  if (!e) return;
  document.getElementById('fMonth').value = e.month;
  document.getElementById('fIncome').value = e.income;
  document.querySelectorAll('.entry-form input[data-group]').forEach(inp => {
    const val = (e[inp.dataset.group] || {})[inp.dataset.cat];
    inp.value = val || '';
    applyBudgetStyle(inp);
  });
  updateSavingsPreview();
  document.getElementById('entryForm').scrollIntoView({ behavior:'smooth', block:'start' });
  showToast(`${monthLabel(month)} 데이터를 불러왔어요. 수정 후 저장하세요.`);
}
window.editEntry = editEntry;

function toggleDetail(month){
  if (expandedMonths.has(month)) expandedMonths.delete(month);
  else expandedMonths.add(month);
  renderHistory();
}
window.toggleDetail = toggleDetail;

function renderChart(){
  const el = document.getElementById('chartBars');
  if (state.entries.length === 0){
    el.innerHTML = `<div style="color:#9AA2AD; font-size:13px; padding: 40px 0; width:100%; text-align:center;">기록이 쌓이면 여기 그래프가 그려져요</div>`;
    return;
  }
  const sorted = [...state.entries].sort((a,b)=> a.month.localeCompare(b.month)).slice(-8);
  const totals = sorted.map(e => sumGroup(e.savings) + sumGroup(e.invest));
  const maxVal = Math.max(...totals, 1);
  el.innerHTML = sorted.map((e, i) => {
    const total = totals[i];
    const h = Math.max(3, (total/maxVal) * 120);
    return `<div class="bar-col">
      <div class="bar" style="height:${h}px;" title="${formatManwon(total)}"></div>
      <div class="bar-label">${monthLabel(e.month)}</div>
    </div>`;
  }).join('');
}

function renderPieMonthSelect(){
  const sel = document.getElementById('pieMonthSelect');
  const sorted = [...state.entries].sort((a,b)=> b.month.localeCompare(a.month));
  if (sorted.length === 0){
    sel.innerHTML = '<option value="">-</option>';
    sel.disabled = true;
    return;
  }
  sel.disabled = false;
  const keep = sorted.some(e => e.month === sel.value) ? sel.value : sorted[0].month;
  sel.innerHTML = sorted.map(e =>
    `<option value="${e.month}" ${e.month === keep ? 'selected' : ''}>${monthLabel(e.month)}</option>`
  ).join('');
}

function renderPieTabs(){
  const el = document.getElementById('pieTabs');
  const labels = { expense:'소비', savings:'저축', invest:'투자' };
  el.innerHTML = Object.keys(labels).map(g =>
    `<button type="button" class="pie-tab ${g === pieGroup ? 'active' : ''}" data-group="${g}">${labels[g]}</button>`
  ).join('');
  el.querySelectorAll('.pie-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      pieGroup = btn.dataset.group;
      renderPieTabs();
      renderDonut();
    });
  });
}

function renderDonut(){
  const sel = document.getElementById('pieMonthSelect');
  const donutEl = document.getElementById('donutChart');
  const legendEl = document.getElementById('pieLegend');
  const entry = state.entries.find(e => e.month === sel.value);
  const data = entry ? (entry[pieGroup] || {}) : {};
  const filtered = Object.entries(data).filter(([,v]) => Number(v) > 0);
  const total = filtered.reduce((s,[,v]) => s + Number(v), 0);

  if (!entry || filtered.length === 0){
    donutEl.style.background = 'var(--bg)';
    legendEl.innerHTML = `<div style="color:#9AA2AD; font-size:13px;">표시할 데이터가 없어요</div>`;
    return;
  }

  let cumulative = 0;
  const stops = filtered.map(([,v], i) => {
    const pct = (Number(v) / total) * 100;
    const start = cumulative;
    cumulative += pct;
    return `${PIE_COLORS[i % PIE_COLORS.length]} ${start}% ${cumulative}%`;
  }).join(', ');
  donutEl.style.background = `conic-gradient(${stops})`;

  legendEl.innerHTML = filtered
    .map(([cat, v], i) => ({ cat, v: Number(v), color: PIE_COLORS[i % PIE_COLORS.length] }))
    .sort((a, b) => b.v - a.v)
    .map(({ cat, v, color }) => {
      const pct = (v / total * 100).toFixed(0);
      return `<div class="pie-legend-item">
        <span class="name"><span class="swatch" style="background:${color}"></span>${cat}</span>
        <span class="amt">${formatManwon(v)} · ${pct}%</span>
      </div>`;
    }).join('');
}

function renderPie(){
  renderPieMonthSelect();
  renderPieTabs();
  renderDonut();
}

async function deleteEntry(month){
  state.entries = state.entries.filter(e => e.month !== month);
  expandedMonths.delete(month);
  await saveData();
  render();
  showToast('삭제했어요');
}
window.deleteEntry = deleteEntry;

document.getElementById('entryForm').addEventListener('submit', async (ev) => {
  ev.preventDefault();
  const month = document.getElementById('fMonth').value;
  if (!month){ showToast('월을 선택해주세요'); return; }
  const entry = {
    month,
    income: Number(document.getElementById('fIncome').value) || 0,
    expense: collectFormGroup('expense'),
    savings: collectFormGroup('savings'),
    invest: collectFormGroup('invest'),
  };
  state.entries = state.entries.filter(e => e.month !== month);
  state.entries.push(entry);
  await saveData();
  render();
  showToast(`${monthLabel(month)} 기록을 저장했어요`);
});

document.getElementById('saveGoalBtn').addEventListener('click', async () => {
  const base = Number(document.getElementById('baseAssetInput').value) || 0;
  const target = Number(document.getElementById('targetAssetInput').value) || 0;
  state.baseAsset = base;
  state.targetAsset = target;
  await saveData();
  render();
  showToast('목표를 업데이트했어요');
});

document.getElementById('resetBtn').addEventListener('click', async () => {
  if (!confirm('모든 기록을 초기화할까요? 이 작업은 되돌릴 수 없어요.')) return;
  state = JSON.parse(JSON.stringify(DEFAULT_DATA));
  expandedMonths = new Set();
  await saveData();
  render();
  showToast('초기화했어요');
});

document.getElementById('pieMonthSelect').addEventListener('change', renderDonut);

document.getElementById('exportBtn').addEventListener('click', () => {
  const dataStr = JSON.stringify(state, null, 2);
  const blob = new Blob([dataStr], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const today = new Date().toISOString().slice(0, 10);
  a.href = url;
  a.download = `homesweethome-backup-${today}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('데이터를 내보냈어요');
});

document.getElementById('importFile').addEventListener('change', async (ev) => {
  const file = ev.target.files[0];
  if (!file) return;
  try{
    const text = await file.text();
    const parsed = JSON.parse(text);
    if (!parsed || typeof parsed !== 'object' || !Array.isArray(parsed.entries)){
      throw new Error('invalid format');
    }
    if (!confirm('가져온 데이터로 현재 데이터를 덮어쓸까요?')){ return; }
    state = {
      baseAsset: parsed.baseAsset ?? DEFAULT_DATA.baseAsset,
      targetAsset: parsed.targetAsset ?? DEFAULT_DATA.targetAsset,
      categories: {
        expense: parsed.categories?.expense ?? [],
        savings: parsed.categories?.savings ?? [],
        invest: parsed.categories?.invest ?? [],
      },
      budgets: {
        expense: parsed.budgets?.expense ?? {},
        savings: parsed.budgets?.savings ?? {},
        invest: parsed.budgets?.invest ?? {},
      },
      entries: parsed.entries ?? []
    };
    expandedMonths = new Set();
    await saveData();
    render();
    showToast('데이터를 가져왔어요');
  }catch(e){
    showToast('가져오기에 실패했어요. 파일 형식을 확인해주세요.');
  }finally{
    ev.target.value = '';
  }
});

// enter key adds category
['newCatExpense','newCatSavings','newCatInvest'].forEach(id => {
  document.getElementById(id).addEventListener('keydown', (ev) => {
    if (ev.key === 'Enter'){
      ev.preventDefault();
      const group = id === 'newCatExpense' ? 'expense' : id === 'newCatSavings' ? 'savings' : 'invest';
      addCategory(group);
    }
  });
});

// set default month field to current month
(function(){
  const now = new Date();
  const m = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  document.getElementById('fMonth').value = m;
})();

loadData();
</script>
